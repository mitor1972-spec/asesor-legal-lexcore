# ============================================================
# PUBLIC WEBHOOKS / PUBLIC ENDPOINTS — verify_jwt = false
# ============================================================
# These functions are called by external services or unauthenticated
# clients and MUST validate their own auth (signatures, tokens, etc.)
#
# - stripe-webhook: validates Stripe signature (STRIPE_WEBHOOK_SECRET)
# - chatwoot-webhook: validates dynamic token from `chatwoot_settings` table
# - client-upload: validates temporary token + expires_at + max_files

[functions.stripe-webhook]
verify_jwt = false

[functions.chatwoot-webhook]
verify_jwt = false

[functions.client-upload]
verify_jwt = false

# ============================================================
# AUTHENTICATED FUNCTIONS — verify_jwt = true (gateway enforced)
# ============================================================
# In addition, each function validates JWT in code with auth.getUser()
# / getClaims() and applies role-based authorization.

# ---- Internal admin / ops tools ----
[functions.process-chatwoot-conversation]
